name: ci

# ============================================================================
# CANONICAL CI — IDENTICAL across every scitex ecosystem repo.
# Synced by `scitex-dev ecosystem sync-workflows`; do not edit per-repo (drift
# is caught + reverted). Package-agnostic: all logic lives in the version-
# controlled .github/ci/{exec,run}-in-sif.sh, which derive the package from the
# checkout — there is nothing to substitute here.
#
# Runner: the self-hosted Spartan CPU runner (label spartan-cpu), inside the
# reused pre-built SIF (~/.scitex/dev/containers/ci-cpu.sif). The SIF bakes
# python 3.11/3.12/3.13 + the ecosystem deps; each run only overlays the
# checkout (PYTHONPATH=src). No per-run install — the SIF IS the cache.
# ============================================================================

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]
  schedule:
    - cron: "0 17 * * *" # nightly 17:00 UTC (~02:00 JST), off-peak
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest-matrix:
    # Job name is a REQUIRED status check — keep it verbatim fleet-wide.
    name: pytest-matrix-on-ubuntu-py${{ matrix.python-version }}
    runs-on: [self-hosted, Linux, X64, spartan-cpu]
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: pytest (reused CI SIF)
        run: bash .github/ci/exec-in-sif.sh pytest "${{ matrix.python-version }}"
      - name: Upload coverage to Codecov
        if: always() && matrix.python-version == '3.12'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          fail_ci_if_error: false

  import-smoke:
    name: import-smoke-on-ubuntu-py3-12
    runs-on: [self-hosted, Linux, X64, spartan-cpu]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: import smoke (reused CI SIF)
        run: bash .github/ci/exec-in-sif.sh import-smoke

  audit:
    name: audit
    runs-on: [self-hosted, Linux, X64, spartan-cpu]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: audit the workspace (reused CI SIF)
        run: bash .github/ci/exec-in-sif.sh audit
