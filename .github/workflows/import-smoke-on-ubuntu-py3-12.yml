name: import-smoke

# MIGRATED: org-level reusable-workflow caller (scitex-ai/.github, 2026-07-10).
# Triggers preserved verbatim from the prior local file (which additionally
# had a nightly schedule + workflow_dispatch not present in the reusable
# workflow's own `on:` — kept here since `on:` in a caller stub governs when
# the caller fires; the reusable's `on: workflow_call: {}` is satisfied by
# the `uses:` invocation regardless).
# New required-status-check context: "import-smoke / import-smoke-on-ubuntu-py3-12"

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: "0 7 * * *"  # nightly 07:00 UTC
  workflow_dispatch:

jobs:
  import-smoke:
    uses: scitex-ai/.github/.github/workflows/import-smoke.yml@main
    secrets: inherit
