name: tests

# MIGRATED: org-level reusable-workflow caller (scitex-ai/.github, 2026-07-10).
# Triggers preserved verbatim from the prior local file.
#
# NOTE (judgment call): the reusable pytest-matrix.yml runs on
# `[self-hosted, Linux, X64, spartan-cpu]` with `uv`, replacing this repo's
# prior `ubuntu-latest` + `actions/setup-python` + `pip` runner/toolchain —
# this is the fleet-standardization intent of the migration (see PR body).
# The per-job HOME workaround for the codecov safe-directory race
# (io PR #22) is superseded by the reusable workflow's own codecov step,
# which does not need it (each self-hosted job already gets a clean venv).
#
# New required-status-check context: "pytest-matrix / pytest-matrix-on-ubuntu-py<X.YY>"

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: "0 7 * * *"  # nightly 07:00 UTC
  workflow_dispatch:

jobs:
  pytest-matrix:
    uses: scitex-ai/.github/.github/workflows/pytest-matrix.yml@main
    secrets: inherit
